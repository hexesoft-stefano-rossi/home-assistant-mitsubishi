# Nome dell'Add-on
name: "Hexesoft Mitsubishi Bridge"
# Versione del software
version: "1.0.5"
# Identificativo interno
slug: "hexesoft_mitsubishi"
# Descrizione estesa
description: "Bridge Mitsubishi in Home Assistant."
# Architetture supportate
arch:
  - aarch64
  - amd64
# Permessi di sistema
init: false
# Mappatura cartelle
map:
  - config:rw

# VALORI DI DEFAULT INIZIALI (Puliti per l'utente finale)
options:
  mitsubishi:
    host: ""
    polling_interval: 10
    operating_mode: "integrated"
    bticino_base_topic: "bticino_bridge"
    heating_boost_delta: 3.0
    cooling_boost_delta: 0.0

  # GRUPPO CONDIZIONATORI (Stile BTicino: lista vuota)
  air_conditioners:
    devices: []

  # GRUPPO IDRONICI (Stile BTicino: lista vuota)
  hydronics:
    devices: []

  mqtt:
    host: ""
    port: 1883
    username: ""
    password: ""
    base_topic: "mitsubishi_bridge"
    discovery_prefix: "homeassistant"
    
  advanced:
    log_level: "info"

# SCHEMA GRAFICO
schema:
  mitsubishi:
    host: str
    polling_interval: int(5,)
    operating_mode: list(standard|integrated)
    bticino_base_topic: str
    heating_boost_delta: float
    cooling_boost_delta: float
  
  air_conditioners:
    devices:
      - name: str
        id: str
        bticino_zone: str?
        supports_dry: bool?
        
  hydronics:
    devices:
      - name: str
        id: str
        type: list(HOT_WATER|HEATING)
      
  mqtt:
    host: str
    port: port
    username: str?
    password: password?
    base_topic: str
    discovery_prefix: str
    
  advanced:
    log_level: list(debug|info|warning|error)